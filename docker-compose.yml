# Minimal Wazuh single-node stack for PHLIPPED rule validation.
# Bind-mount ../phlipped-rules so rule edits are picked up after `docker compose restart wazuh-manager`.

services:
  wazuh-manager:
    image: wazuh/wazuh-manager:4.9.0
    hostname: wazuh-manager
    restart: unless-stopped
    ulimits:
      memlock: { soft: -1, hard: -1 }
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "55000:55000"
    environment:
      INDEXER_URL: https://wazuh-indexer:9200
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: SecretPassword
    volumes:
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - ../phlipped-rules/wazuh:/var/ossec/etc/rules/local_rules.d:ro

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.9.0
    hostname: wazuh-indexer
    restart: unless-stopped
    ulimits:
      memlock: { soft: -1, hard: -1 }
    environment:
      OPENSEARCH_JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.9.0
    hostname: wazuh-dashboard
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: SecretPassword
      WAZUH_API_URL: https://wazuh-manager
    depends_on:
      - wazuh-indexer

volumes:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_indexer_data:
